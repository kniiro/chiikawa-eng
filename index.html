<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- iPhoneアプリ設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="えいごすごろく">
    <link rel="apple-touch-icon" href="chikawa.png">

    <title>ちいかわのえいごすごろく</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container" id="app">
        <!-- 🎮 1. スタート・すごろく画面 -->
        <div id="start-screen">
            <h1>ちいかわの<br>えいごすごろく 🎲</h1>

            <!-- 🌟 あつめたなかまエリア -->
            <div id="friends-area" class="friends-container">
                <div class="friends-title">あつめた なかま</div>
                <!-- JSでキャラ枠が生成されます -->
            </div>

            <div class="sugoroku-container">
                <p style="margin: 0 0 5px; font-weight: bold; color: #FF1493; font-size: 18px;">いま <span
                        id="current-space-text" style="font-size:24px;">0</span> マスめ！</p>
                <p style="margin: 0; font-size: 12px; color: #555;">8もん せいかいで 1マスすすむよ！</p>

                <!-- すごろくのマス目（JSで自動生成） -->
                <div class="sugoroku-grid" id="board-grid"></div>
            </div>

            <button class="action-btn" onclick="startGame()">クイズにちょうせん！</button>

            <!-- データ管理（折りたたみ） -->
            <details class="admin-box">
                <summary style="font-size: 12px; color: #666; cursor: pointer; font-weight:bold;">⚙️ おとなのひとへ（データリセット）
                </summary>
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <button class="btn-small" onclick="resetData()">最初からやり直す</button>
                </div>
            </details>
            <p style="margin-top: 15px; font-size: 12px; color: #aaa;">v1.3</p>
        </div>

        <!-- 🤔 2. クイズ画面 -->
        <div id="quiz-screen" class="hidden" style="flex: 1;">
            <p id="question-counter" style="font-weight: bold; color: #666; margin-bottom:5px;">もんだい 1 / 10</p>
            <p style="margin:0; font-size:14px; color:#FF1493; font-weight:bold;">えいごで なんていう？</p>

            <!-- 日本語表示 -->
            <div id="question-text" class="question-text">りんご</div>

            <!-- 選択肢コンテナ -->
            <div id="choices-container"></div>

            <!-- 答え合わせ表示 -->
            <div id="explanation-area" class="hidden explanation-box">
                <p style="margin:0; font-weight:bold; color:#777;">せいかいは…</p>
                <h3 id="exp-word" style="font-size: 36px; margin: 5px 0;">apple</h3>
                <button class="action-btn"
                    style="margin-top: 15px; background-color: #32CD32; box-shadow: 0 6px #228B22;"
                    onclick="nextQuestion()">つぎへ！</button>
            </div>
        </div>

        <!-- 🏆 3. リザルト画面 -->
        <div id="result-screen" class="hidden">
            <h1 style="color: #333; font-size:28px;">けっか はっぴょう</h1>
            <h2 id="final-score" style="font-size: 60px; color: #FF4500; margin: 10px 0;">10 / 10</h2>

            <div
                style="background: #FFF; border: 4px solid #FFD700; border-radius: 15px; padding: 20px; margin-bottom: 20px;">
                <p id="board-result-msg"
                    style="font-weight: bold; font-size: 22px; margin: 0; line-height: 1.5; color: #FF1493;"></p>
            </div>

            <button class="action-btn" id="btn-return-home" onclick="checkUnlocksAndReturn()">すごろくを みる！</button>
        </div>

        <div id="feedback-mark" class="feedback-mark"></div>
    </div>

    <!-- 🎉 キャラ解放演出モーダル -->
    <div id="unlock-overlay" class="overlay-full hidden">
        <h1 class="overlay-msg">やったー！<br>あたらしい なかま！</h1>
        <div id="unlock-icon" class="big-icon char-image-box pop-anim"></div>
        <h2 id="unlock-name" style="color: #333; font-size: 28px; margin-top:20px;">ちいかわ</h2>
        <button class="action-btn" style="width: 80%; margin-top: 30px;"
            onclick="closeUnlockOverlay()">すごろくにもどる</button>
    </div>

    <!-- 👑 ゴール演出モーダル -->
    <div id="goal-overlay" class="overlay-full hidden">
        <h1 class="overlay-msg" style="font-size:40px;">👑 ゴール 👑<br>おめでとう！！</h1>
        <p style="font-weight:bold; font-size:18px;">みおりちゃんは<br>えいごマスターだね！</p>
        <div class="goal-container">
            <div class="goal-icon char-image-box img-chiikawa"></div>
            <div class="goal-icon char-image-box img-usagi"></div>
            <div class="goal-icon char-image-box img-hachiware"></div>
            <div class="goal-icon char-image-box img-kurimanju"></div>
            <div class="goal-icon char-image-box img-momonga"></div>
        </div>
        <button class="action-btn" style="width: 80%; margin-top: 20px;" onclick="closeGoalOverlay()">やったー！</button>
    </div>

    <script>
        /* =========================================================
           1. 英単語データ (英検5級 260語)
           ========================================================= */
        let wordsData = []; // CSVから読み込むためにletに変更し、空配列で初期化

        /* =========================================================
           2. キャラクターとすごろく設定
           ========================================================= */
        const charConfig = [
            { space: 3, id: 'chiikawa', name: 'ちいかわ', quotes: ['ワッ…！', 'がんばれ…！', 'エヘヘ'] },
            { space: 6, id: 'usagi', name: 'うさぎ', quotes: ['ヤハ！', 'ウララ！', 'プルャ！'] },
            { space: 10, id: 'hachiware', name: 'ハチワレ', quotes: ['なんとかなれ！', 'いい調子！', 'やったー！'] },
            { space: 15, id: 'kurimanju', name: 'くりまんじゅう', quotes: ['ハーッ…', 'シュパッ', 'うまい！'] },
            { space: 18, id: 'momonga', name: 'モモンガ', quotes: ['みろ！', 'ほめろ！', 'フンッ'] }
        ];

        const TOTAL_SPACES = 20;

        let gameStats = {
            space: 0,
            unlocked: { chiikawa: false, usagi: false, hachiware: false, kurimanju: false, momonga: false }
        };

        let currentPos = 0;
        let friendsCount = 0;

        // CSVからデータを読み込む関数
        async function loadWordsData() {
            try {
                // キャッシュ回避のためクエリパラメータを追加
                const response = await fetch('words.csv?' + new Date().getTime());
                if (!response.ok) throw new Error('Network response was not ok');
                const text = await response.text();

                // 改行で分割し、1行目のヘッダーを除外
                const lines = text.trim().split('\n');
                lines.shift(); // ヘッダーを削除

                wordsData = lines.map(line => {
                    const [word, meaning] = line.split(',');
                    return { word: word.trim(), meaning: meaning.trim() };
                }).filter(item => item.word && item.meaning);

                console.log('Words loaded:', wordsData.length);
                return true;
            } catch (error) {
                console.error('Error loading words.csv:', error);
                alert('単語データの読み込みに失敗しました。ページをリロードしてください。');
                return false;
            }
        }

        /* ---------------------------------------------------------
           起動時の初期化
           --------------------------------------------------------- */
        async function initGame() {
            // まずCSVから単語データをロード
            const loaded = await loadWordsData();
            if (!loaded) return; // ロード失敗時は進まない

            // 進行状況の読み込み
            if (localStorage.getItem('chiikawaEnglishPos')) {
                currentPos = parseInt(localStorage.getItem('chiikawaEnglishPos'), 10);
                friendsCount = parseInt(localStorage.getItem('chiikawaEnglishFriends'), 10) || 0;
            }
            createSugorokuBoard();
            updateFriendsDisplay();
        }

        window.addEventListener('load', initGame);

        // --- データ読み込み＆保存 ---
        function loadData() {
            const saved = localStorage.getItem('mioriSugorokuStats');
            if (saved) {
                try { gameStats = JSON.parse(saved); } catch (e) { }
            }
            renderBoard();
            renderFriends();
        }
        function saveData() { localStorage.setItem('mioriSugorokuStats', JSON.stringify(gameStats)); }
        // 管理用リセット関数
        function resetData() {
            if (confirm("本当にデータをリセットしますか？最初からになります。")) {
                localStorage.removeItem('chiikawaEnglishPos');
                localStorage.removeItem('chiikawaEnglishFriends');
                currentPos = 0;
                friendsCount = 0;
                createSugorokuBoard();
                updateFriendsDisplay();
            }
        }

        // --- ボード＆なかま描画 ---
        function renderBoard() {
            document.getElementById('current-space-text').innerText = gameStats.space;
            const grid = document.getElementById('board-grid');
            grid.innerHTML = '';

            for (let i = 1; i <= TOTAL_SPACES; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (i === gameStats.space) cell.classList.add('active');
                if (i === TOTAL_SPACES) cell.classList.add('goal');

                cell.innerHTML = `<div class="cell-num">${i}</div>`;

                // キャラが配置されるマスかチェック
                const charData = charConfig.find(c => c.space === i);
                if (charData) {
                    const isUnlocked = gameStats.unlocked[charData.id];
                    const iconClass = isUnlocked ? `img-${charData.id}` : `img-${charData.id} locked`;
                    cell.innerHTML += `<div class="cell-icon char-image-box ${iconClass}"></div>`;
                } else if (i === TOTAL_SPACES) {
                    cell.innerHTML += `<div style="font-size:24px;">👑</div>`;
                }

                grid.appendChild(cell);
            }
        }

        function renderFriends() {
            const container = document.getElementById('friends-area');
            // タイトル以外をクリア
            container.innerHTML = '<div class="friends-title">あつめた なかま</div>';

            charConfig.forEach(char => {
                const wrapper = document.createElement('div');
                wrapper.className = 'friend-wrapper';

                const isUnlocked = gameStats.unlocked[char.id];
                // 未獲得の場合はモノクロ・半透明のシルエットにする
                const iconClass = isUnlocked ? `img-${char.id}` : `img-${char.id} locked`;

                wrapper.innerHTML = `
                    <div class="char-image-box friend-box ${iconClass}"></div>
                    <div id="balloon-${char.id}" class="balloon"></div>
                `;
                container.appendChild(wrapper);
            });
        }

        /* =========================================================
           3. 応援コメント (タイマー処理)
           ========================================================= */
        let cheerInterval = null;

        function startCheering() {
            if (cheerInterval) clearInterval(cheerInterval);
            showCheerMessage(); // すぐに1回呼ぶ
            cheerInterval = setInterval(showCheerMessage, 3500); // 3.5秒ごとに吹き出しを変える
        }

        function stopCheering() {
            if (cheerInterval) clearInterval(cheerInterval);
        }

        function showCheerMessage() {
            // いったん全ての吹き出しを消す
            document.querySelectorAll('.balloon').forEach(b => b.classList.remove('show'));

            // 解放済みのキャラを探す
            const unlockedChars = charConfig.filter(c => gameStats.unlocked[c.id]);
            if (unlockedChars.length === 0) return;

            // ランダムに1人選んで喋らせる
            const randomChar = unlockedChars[Math.floor(Math.random() * unlockedChars.length)];
            const balloon = document.getElementById(`balloon-${randomChar.id}`);
            if (balloon) {
                const quotes = randomChar.quotes;
                balloon.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                balloon.classList.add('show');
            }
        }

        /* =========================================================
           4. 音声と効果音 (Web API)
           ========================================================= */
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // --- 音声再生（Web Audio API + ローカルmp3） ---
        async function playWordAudio(wordText) {
            if (!wordText) return;
            initAudio();

            // 安全なファイル名に変換（Pythonスクリプトの実装に合わせる）
            const safeWord = wordText.replace(/ /g, '_').toLowerCase();
            const url = 'audio/' + safeWord + '.mp3';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network status: ' + response.status);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                source.start();
            } catch (e) {
                console.error('Error playing local mp3:', e);
            }
        }

        function playCorrectSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // A5
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playIncorrectSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        /* =========================================================
           5. ゲーム進行
           ========================================================= */
        let currentQuizSet = [];
        let currentQuestionIndex = 0;
        let score = 0;
        const totalQuestions = 10;
        let newlyUnlockedChar = null;
        let hitGoal = false;

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function showScreen(id) {
            ['start-screen', 'quiz-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function showStartScreen() {
            renderFriends(); // 画面に戻るたびになかまを描画し直す
            showScreen('start-screen');
            startCheering(); // 応援再開
        }

        function startGame() {
            initAudio();
            stopCheering(); // クイズ中は応援ストップ

            score = 0; currentQuestionIndex = 0; hitGoal = false; newlyUnlockedChar = null;
            // ランダムに10問選ぶ
            currentQuizSet = shuffleArray(wordsData).slice(0, totalQuestions);
            showScreen('quiz-screen');
            setQuestion();
        }

        function setQuestion() {
            const q = currentQuizSet[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `もんだい ${currentQuestionIndex + 1} / ${totalQuestions}`;
            document.getElementById('question-text').innerText = q.meaning; // 日本語を表示

            const container = document.getElementById('choices-container');
            container.innerHTML = '';

            // 他の単語（英単語）からランダムに3つダミーを作成
            const dummies = [];
            while (dummies.length < 3) {
                const r = wordsData[Math.floor(Math.random() * wordsData.length)].word;
                if (r !== q.word && !dummies.includes(r)) dummies.push(r);
            }
            const choices = shuffleArray([q.word, ...dummies]);

            // 選択肢の描画（「おとをきく」ボタン ＋ 英語ボタン）
            choices.forEach(text => {
                const row = document.createElement('div');
                row.className = 'choice-row';

                // おとをきくボタン
                const listenBtn = document.createElement('button');
                listenBtn.className = 'listen-btn';
                listenBtn.innerHTML = `🔊<span>きく</span>`;
                listenBtn.onclick = () => {
                    playWordAudio(text);
                };

                // 英単語を選ぶボタン
                const choiceBtn = document.createElement('button');
                choiceBtn.className = 'choice-btn';
                choiceBtn.innerText = text;
                choiceBtn.onclick = () => checkAnswer(text, q.word, choiceBtn);

                row.appendChild(listenBtn);
                row.appendChild(choiceBtn);
                container.appendChild(row);
            });

            document.getElementById('explanation-area').classList.add('hidden');
        }

        function checkAnswer(selected, correct, btn) {
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
            const isCorrect = (selected === correct);
            const mark = document.getElementById('feedback-mark');
            mark.innerText = isCorrect ? '⭕️' : '❌';
            mark.style.color = isCorrect ? '#FF4500' : '#1E90FF';
            mark.className = 'feedback-mark mark-show';

            if (isCorrect) { playCorrectSound(); score++; btn.style.backgroundColor = '#FFD700'; }
            else {
                playIncorrectSound(); btn.style.backgroundColor = '#E0E0E0';
                document.querySelectorAll('.choice-btn').forEach(b => {
                    if (b.innerText === correct) { b.style.backgroundColor = '#FFD700'; b.style.border = '4px solid #FF4500'; }
                });
            }

            setTimeout(() => mark.className = 'feedback-mark', 800);

            // 答えあわせに正解の英単語を表示し、自動で発音する
            document.getElementById('exp-word').innerText = correct;
            document.getElementById('explanation-area').classList.remove('hidden');
            setTimeout(() => { playWordAudio(correct); }, 300);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < totalQuestions) setQuestion();
            else showResult();
        }

        // --- リザルト＆すごろく処理 ---
        function showResult() {
            const isSuccess = score >= 8; // 8問以上で1マス進む
            let moved = false;

            if (isSuccess && gameStats.space < TOTAL_SPACES) {
                gameStats.space++;
                moved = true;

                // キャラ解放チェック
                const unlockData = charConfig.find(c => c.space === gameStats.space);
                if (unlockData && !gameStats.unlocked[unlockData.id]) {
                    gameStats.unlocked[unlockData.id] = true;
                    newlyUnlockedChar = unlockData;
                }

                // ゴールチェック
                if (gameStats.space === TOTAL_SPACES) {
                    hitGoal = true;
                }
            }
            saveData();
            renderBoard();

            showScreen('result-screen');
            document.getElementById('final-score').innerText = `${score} もん せいかい！`;

            const msgEl = document.getElementById('board-result-msg');
            if (moved) {
                msgEl.innerText = "やったね！！✨\n１マス すすんだよ！";
            } else if (gameStats.space === TOTAL_SPACES) {
                msgEl.innerText = "ゴールしてるよ！\nえいごマスターだね！";
            } else {
                msgEl.innerText = "おしい！ もうすこし！\nマスは すすめないよ💦\nつぎ がんばろう！";
            }
        }

        // 結果画面のボタンから呼ばれる
        function checkUnlocksAndReturn() {
            if (hitGoal) {
                showGoalOverlay();
            } else if (newlyUnlockedChar) {
                showUnlockOverlay(newlyUnlockedChar);
            } else {
                showStartScreen();
            }
        }

        function showUnlockOverlay(char) {
            const overlay = document.getElementById('unlock-overlay');
            const container = document.getElementById('unlock-icon');
            container.className = `big-icon char-image-box img-${char.id} pop-anim`;
            document.getElementById('unlock-name').innerText = char.name;
            overlay.classList.remove('hidden');
        }
        function closeUnlockOverlay() {
            document.getElementById('unlock-overlay').classList.add('hidden');
            showStartScreen();
        }

        function showGoalOverlay() {
            document.getElementById('goal-overlay').classList.remove('hidden');
        }
        function closeGoalOverlay() {
            document.getElementById('goal-overlay').classList.add('hidden');
            showStartScreen();
        }

        // --- 初期化 ---
        window.onload = () => {
            loadData();
            startCheering();
        };
    </script>
</body>

</html>
